<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="publict/img/css/style.css">
</head>
<style>
  body{
    overflow: hidden;
    margin: 0;
    padding: 0;
    background-color: #1B2430;
  }
</style>
<body>
<div class="slideshow-container">

<div class="mySlides fade">
  <img class="img" src="publict/img/4.png" style="width: 100%; height:100%;">
</div>

<div class="mySlides fade">
  <img class="img" src="publict/img/4.png" style="width: 100%; height:100%;">
</div>

<div class="mySlides fade">
  <img class="img" src="publict/img/4.png" style="width: 100%; height:100%;">
</div>
</div>
<div style="text-align:center; color: transparent;">
  <span class="dot"></span> 
  <span class="dot"></span> 
  <span class="dot"></span> 
</div>

<script>
let slideIndex = 0;
showSlides();

function showSlides() {
  let i;
  let slides = document.getElementsByClassName("mySlides");
  let dots = document.getElementsByClassName("dot");
  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";  
  }
  slideIndex++;
  if (slideIndex > slides.length) {slideIndex = 1}    
  for (i = 0; i < dots.length; i++) {
    dots[i].className = dots[i].className.replace(" active", "");
  }
  slides[slideIndex-1].style.display = "block";  
  dots[slideIndex-1].className += " active";
  setTimeout(showSlides, 15000); // Change image every 5 seconds
}
</script>

</body>
</html>
